name: rice_quality_app
description: >
  Offline-first Android app for rice quality assessment using a fine-tuned
  ConvNeXt-Small model (INT8, 55.6 MB) running via ONNX Runtime Mobile with
  XNNPACK acceleration. Produces grain counts, morphological measurements, and
  CIELAB colour profiles from a single photo in ~32 seconds on mid-range hardware.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Camera & image input
  camera:        ^0.11.4
  image_picker:  ^1.2.1
  image:         ^4.8.0       # In-isolate tile extraction and resize

  # On-device ML inference
  onnxruntime:   ^1.4.1

  # Persistence
  sqflite:       ^2.4.2
  path:          ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4

  # Location (optional opt-in)
  geolocator:    ^14.0.2

  # Export
  share_plus:    ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/convnext_3x4_int8.onnx